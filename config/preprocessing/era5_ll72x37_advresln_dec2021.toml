# 5° lat-lon (72 × 37) ERA5 spectral → daily transport binary.
# Dec 1-3, 2021. Used for the advection-vs-resolution experiment
# (advection-only, BL-enhanced IC, GPU runtime).
#
# Usage:
#   for d in 01 02 03; do
#     julia -t8 --project=. scripts/preprocessing/preprocess_transport_binary.jl \
#         config/preprocessing/era5_ll72x37_advresln_dec2021.toml --day 2021-12-$d
#   done

[input]
spectral_dir = "~/data/AtmosTransport/met/era5/0.5x0.5/spectral_hourly"
thermo_dir   = "~/data/AtmosTransport/met/era5/0.5x0.5/physics"
coefficients = "config/era5_L137_coefficients.toml"

[output]
directory  = "~/data/AtmosTransport/met/era5/ll72x37_advresln/transport_binary_v2_tropo34_dec2021_f64"
mass_basis = "dry"

[grid]
type = "latlon"
nlon = 72
nlat = 37
level_top = 1
level_bot = 137
echlevs = "ml137_tropo34"
merge_min_thickness_Pa = 1000.0

[numerics]
float_type   = "Float64"
dt           = 900.0
met_interval = 3600.0

[mass_fix]
enable                = true
target_ps_dry_pa      = 98726.0
qv_global_climatology = 0.00247
