# ===========================================================================
# GEOS-FP (Forward Processing) — Met Data Source Configuration
#
# NASA GMAO GEOS Forward Processing system.
# Near real-time assimilated meteorological fields.
# Same model and vertical coordinate as MERRA-2 but at higher horizontal
# resolution and with near-zero latency.
#
# OPeNDAP access: NO AUTHENTICATION REQUIRED
# ===========================================================================

[source]
name        = "GEOS-FP"
description = "NASA GEOS Forward Processing (near real-time assimilated meteorology)"
institution = "NASA Global Modeling and Assimilation Office (GMAO)"
reference   = "https://gmao.gsfc.nasa.gov/GMAO_products/NRT_products.php"

# ---------------------------------------------------------------------------
# Native grid specification
# ---------------------------------------------------------------------------
[grid]
type      = "CubedSphere"
Nc        = 720           # native GEOS-FP C720 cubed-sphere face size
Nz        = 72            # number of native model levels
resolution_km = 12.5
# ---------------------------------------------------------------------------
# Vertical coordinate: 72 hybrid sigma-pressure levels
#
# All met sources use HybridSigmaPressure(A, B) with source-specific
# coefficients. Same 72-level coordinate as MERRA-2.
# GEOS-FP provides edge pressures (PLE) directly, but A/B coefficients
# allow reconstruction from surface pressure alone.
# ---------------------------------------------------------------------------
[vertical]
coordinate_type   = "HybridSigmaPressure"
coefficients_file = "config/geos_L72_coefficients.toml"
n_levels          = 72
n_interfaces      = 73
surface_pressure_var = "surface_pressure"

[preprocessing]
format               = "netcdf_native_hourly"
level_orientation    = "auto"
mass_flux_dt_seconds = 450.0
include_surface      = false  # surface physics comes from the typed 0.25° fallback path
include_convection   = false  # convection physics comes from the typed 0.25° fallback path
physics_dir          = ""     # set by preprocessing TOML when include_surface/convection=true
physics_layout       = "auto" # auto | latlon_025 | cubed_sphere
collections_required = ["tavg_1hr_ctm_c0720_v72"]

# ---------------------------------------------------------------------------
# Data access configuration
# ---------------------------------------------------------------------------
[access]
protocol      = "http"
base_url      = "http://geoschemdata.wustl.edu/ExtData/GEOS_C720/GEOS_FP_Native"
auth_required = false
time_interval = 3600.0

# ---------------------------------------------------------------------------
# Collections — groups of variables in the same OPeNDAP dataset / file
# ---------------------------------------------------------------------------
[collections.tavg_1hr_ctm_c0720_v72]
dataset     = "tavg_1hr_ctm_c0720_v72"
frequency   = "hourly"
vertical    = "v72"
levels      = 72
description = "Hourly native C720 CTM DELP, PS, QV, MFXC, MFYC"

# ---------------------------------------------------------------------------
# Variable mapping: canonical_name → native name + collection
#
# unit_conversion: multiplicative factor to convert native → canonical units.
#                  Default is 1.0 (native units already match canonical).
# ---------------------------------------------------------------------------

[variables.u_wind]
native_name     = "U"
collection      = "tavg_1hr_ctm_c0720_v72"

[variables.v_wind]
native_name     = "V"
collection      = "tavg_1hr_ctm_c0720_v72"

[variables.w_wind]
native_name     = "omega"
collection      = "asm_Nv_inst"

[variables.temperature]
native_name     = "t"
collection      = "asm_Nv_inst"

[variables.specific_humidity]
native_name     = "QV"
collection      = "tavg_1hr_ctm_c0720_v72"

[variables.surface_pressure]
native_name     = "PS"
collection      = "tavg_1hr_ctm_c0720_v72"

[variables.pressure_thickness]
native_name     = "DELP"
collection      = "tavg_1hr_ctm_c0720_v72"

[variables.horizontal_mass_flux_x]
native_name     = "MFXC"
collection      = "tavg_1hr_ctm_c0720_v72"

[variables.horizontal_mass_flux_y]
native_name     = "MFYC"
collection      = "tavg_1hr_ctm_c0720_v72"

[variables.mid_level_pressure]
native_name     = "pl"
collection      = "asm_Nv_inst"

[variables.mid_layer_height]
native_name     = "h"
collection      = "asm_Nv_inst"

[variables.surface_geopotential]
native_name     = "phis"
collection      = "asm_Nv_inst"

[variables.diffusivity]
native_name     = "kh"
collection      = "trb_Ne"

[variables.edge_pressure]
native_name     = "ple"
collection      = "trb_Ne"
