# Quickstart: cubed-sphere C90 (~2°), 3-day advection-only, F32, BL-enhanced IC.
#
# C90 is the largest grid in the quickstart bundle and the closest
# in resolution to the 2.5° lat-lon variant — best for newcomer demos
# that want to compare topology behaviour at similar effective
# resolution.
#
# Run:
#   julia --project=. scripts/run_transport.jl \
#       config/runs/quickstart/cs_c90_advonly.toml

[input]
folder     = "~/data/AtmosTransport_quickstart/met/era5_cs_c90_dec2021_f32/"
start_date = "2021-12-01"
end_date   = "2021-12-03"

[architecture]
use_gpu = true

[numerics]
float_type = "Float32"

[run]
scheme = "slopes"

[tracers.co2_bl]
[tracers.co2_bl.init]
# CS supports `uniform | file | netcdf | file_field | catrine_co2`.
# `bl_enhanced` (used by the LL quickstart configs) is LL-only — start
# from a uniform 400 ppm background here.
kind       = "uniform"
background = 4.0e-4

[output]
snapshot_hours = [0, 6, 12, 18, 24, 30, 36, 42, 48, 54, 60, 66, 72]
snapshot_file  = "~/data/AtmosTransport_quickstart/output/cs_c90_advonly.nc"
