# ===========================================================================
# Pure advection diagnostic — GEOS-IT C180 (Lin-Rood + vertical remap)
#
# NO diffusion, NO convection, NO chemistry. Isolates advection/remap only.
# Run variants by overriding [metadata] flags:
#   dry_correction      = false/false   (dry vs moist air mass)
#   q_space        = true/false   (q-space vs rm-space transport)
# ===========================================================================

[architecture]
use_gpu    = true
float_type = "Float32"

[grid]
type       = "cubed_sphere"
met_source = "geosfp"
Nc         = 180

[met_data]
driver           = "geosfp_cs"
product          = "geosit_c180"
netcdf_dir       = "~/data/AtmosTransport/met/geosit_c180/raw_catrine"
preprocessed_dir = "/temp2/catrine-runs/met/geosit_c180"
surface_data_bin_dir = "/temp1/catrine/met/geosit_c180/surface_bin"
coord_file       = "~/code/gitHub/AtmosTransportModel/data/grids/cs_c180_gridspec.nc"
start_date       = "2021-12-01"
end_date         = "2021-12-03"
dt               = 300
met_interval     = 3600
mass_flux_dt     = 450
Hp               = 3

[initial_conditions]
co2.file     = "~/data/AtmosTransport/catrine/InitialConditions/startCO2_202112010000.nc"
co2.variable = "CO2"
sf6.file     = "~/data/AtmosTransport/catrine/InitialConditions/startSF6_202112010000.nc"
sf6.variable = "SF6"

[tracers.co2]
emission   = "lmdz_co2"
file       = "~/data/AtmosTransport/catrine/preprocessed_c180/lmdz_co2_cs_c180_float32.bin"
species    = "co2"
flux_var   = "flux_apos"
start_date = "2021-12-01"
end_date   = "2023-12-31"

[tracers.sf6]
emission         = "edgar_sf6"
file             = "~/data/AtmosTransport/catrine/preprocessed_c180/edgar_sf6_cs_c180_float32.bin"
noaa_growth_file = "~/data/AtmosTransport/catrine/Emissions/sf6_gr_gl.txt"
year             = 2022
scale_year       = 2022

[chemistry]
type = "none"

[advection]
scheme         = "ppm"
ppm_order      = 7
damp_coeff     = 0.02
linrood        = true
vertical_remap = true
mass_fixer     = true

# NO [convection] — pure advection
# NO [diffusion]  — pure advection

[metadata]
dry_correction      = false
remap_pressure_fix  = true
q_space             = true

[output]
filename      = "/temp1/catrine/output/advonly_qspace_moist"
auto_convert  = true
format        = "binary"
split         = "daily"
interval      = 10800

[output.fields]
sf6_3d           = {type = "full_3d", species = "sf6"}
co2_3d           = {type = "full_3d", species = "co2"}
co2_column_mass  = {type = "column_mass", species = "co2"}
surface_pressure = "surface_pressure"

[buffering]
strategy = "single"
