# Catrine C48 3-day test — FULL PHYSICS (advection + diffusion + convection
# + GridFED fossil-CO2 surface flux)
#
# Operator stack: slopes advection + constant-Kz ImplicitVerticalDiffusion
# + TM5Convection + per-cell kg/s surface emissions on the fossil tracer.
#
# STATUS — convection requires TM5 sections in the CS binary
# (`advdiffconv.toml` notes). The CS regridder does not pass them through
# yet, so this config errors at recipe validation until that gap closes.
# Drop `[convection]` to run the rest (surface flux + diffusion + advection).
#
# Runner:   julia -t8 --project=. scripts/run_transport.jl \
#               config/runs/catrine_c48_3d/fullphysics.toml

[input]
folder     = "~/data/AtmosTransport/met/era5/cs_c48/transport_binary_v2_tropo34_dec2021_f64/"
start_date = "2021-12-01"
end_date   = "2021-12-03"

[architecture]
use_gpu = true

[numerics]
float_type = "Float32"

[run]
scheme = "slopes"

[tracers.co2_natural]
[tracers.co2_natural.init]
kind = "catrine_co2"

[tracers.co2_fossil]
[tracers.co2_fossil.init]
kind = "uniform"
background = 0.0

# GridFED monthly-mean fossil-CO2 emissions in kg/m²/s. The CS builder
# (plan 40 Commit 1d) conservatively LL→CS-regrids per panel, then
# multiplies by panel cell area to yield per-cell kg/s for the
# `SurfaceFluxSource`. December 2021 → time_index = 12.
[tracers.co2_fossil.surface_flux]
kind       = "gridfed_fossil_co2"
file       = "~/data/AtmosTransport/catrine/Emissions/gridfed/GCP-GridFEDv2024.0_2021.short.nc"
time_index = 12

[diffusion]
kind  = "constant"
value = 1.0

[convection]
kind = "tm5"

[output]
snapshot_hours = [0, 6, 12, 18, 24, 30, 36, 42, 48, 54, 60, 66, 72]
snapshot_file = "~/data/AtmosTransport/output/catrine_c48_3d/fullphysics.nc"
