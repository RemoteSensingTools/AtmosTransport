# src_v2 transport-binary sequence runner config

[input]
binary_paths = [
    "~/data/AtmosTransport/met/era5/N320/transport_binary_v2_tropo34_dec2021_f64/era5_transport_v2_rgN320_20211201_merged1000Pa_float64.bin",
]

[numerics]
float_type = "Float64"

[run]
scheme = "upwind"
tracer_name = "CO2"
start_window = 1
stop_window = 24
reset_air_mass_each_window = false

[init]
kind = "gaussian_blob"
background = 4.0e-4
amplitude = 4.0e-4
lon0_deg = 0.0
lat0_deg = 0.0
sigma_lon_deg = 12.0
sigma_lat_deg = 8.0

[output]
snapshot_hours = [0, 6, 12, 18, 24]
snapshot_file = "~/data/AtmosTransport/output/src_v2_snapshots/era5_reduced_gaussian_transport_v2_dec2021.nc"
