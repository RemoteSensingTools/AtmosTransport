# ===========================================================================
# CATRINE D7.1 — GEOS-IT C180 Cubed-Sphere — Non-Local PBL Diffusion
#
# Same as catrine_geosit_c180.toml but with Holtslag-Boville counter-gradient
# PBL scheme (NonLocalPBLDiffusion) instead of local K-diffusion.
#
# Usage:
#   using CUDA
#   using AtmosTransport
#   model = build_model_from_config("config/runs/catrine_geosit_c180_nonlocal.toml")
#   run!(model)
# ===========================================================================

[architecture]
use_gpu    = true
float_type = "Float32"

[grid]
type       = "cubed_sphere"
met_source = "geosfp"
Nc         = 180

[met_data]
driver           = "geosfp_cs"
product          = "geosit_c180"
netcdf_dir       = "~/data/geosit_c180_catrine"
preprocessed_dir = "/temp2/catrine-runs/met/geosit_c180"
surface_data_bin_dir = "/temp2/catrine-runs/met/geosit_c180/surface_bin"
coord_file       = "~/code/gitHub/AtmosTransportModel/data/grids/cs_c180_gridspec.nc"
start_date       = "2021-12-01"
end_date         = "2021-12-07"
dt               = 300
met_interval     = 3600
mass_flux_dt     = 450
Hp               = 3

# --- Initial conditions ---
[initial_conditions]
co2.file     = "~/data/AtmosTransport/catrine/InitialConditions/startCO2_202112010000.nc"
co2.variable = "CO2"
sf6.file     = "~/data/AtmosTransport/catrine/InitialConditions/startSF6_202112010000.nc"
sf6.variable = "SF6"

# --- Tracers ---

[tracers.sf6]
emission         = "edgar_sf6"
file             = "~/data/AtmosTransport/catrine/Emissions/edgar_v8/v8.0_FT2022_GHG_SF6_2022_TOTALS_emi.nc"
noaa_growth_file = "~/data/AtmosTransport/catrine/Emissions/sf6_gr_gl.txt"
year             = 2022
scale_year       = 2022

[tracers.fossil_co2]
emission = "gridfed"
dir      = "~/data/AtmosTransport/catrine/Emissions/gridfed"
species  = "fossil_co2"
year     = 2022

# --- Chemistry (none needed for SF6 test period, fossil CO2 is inert) ---
[chemistry]
type = "none"

# --- Advection ---
[advection]
scheme    = "ppm"
ppm_order = 7

# --- Convection ---
[convection]
type = "tiedtke"

# --- Diffusion (non-local Holtslag-Boville counter-gradient) ---
[diffusion]
type   = "nonlocal_pbl"
beta_h = 15.0
Kz_bg  = 0.1
Kz_min = 0.01
Kz_max = 500.0
fak    = 8.5
sffrac = 0.1

# --- Output (3-hourly, native CS binary, daily files) ---
[output]
filename      = "/temp2/catrine-runs/output/catrine_geosit_c180_nonlocal"
format        = "binary"
split         = "daily"
interval      = 10800

[output.fields]
sf6_3d           = {type = "full_3d", species = "sf6"}
fossil_co2_3d    = {type = "full_3d", species = "fossil_co2"}
sf6_column_mass  = {type = "column_mass", species = "sf6"}
fco2_column_mass = {type = "column_mass", species = "fossil_co2"}
sf6_emission     = {type = "emission_flux", species = "sf6"}
fco2_emission    = {type = "emission_flux", species = "fossil_co2"}
surface_pressure = "surface_pressure"
pbl_height       = "pbl_height"

[buffering]
strategy = "double"
