# Quickstart: cubed-sphere C90 (~1°), 3-day advection-only, F32, uniform IC.
#
# C90 is the highest-resolution grid in the quickstart bundle (~1°
# at the equator, finer than the 2.5° LL 144×73 variant) — best for
# newcomer demos that want to see real transport patterns on a
# realistic CS grid.
#
# Run:
#   julia --project=. scripts/run_transport.jl \
#       config/runs/quickstart/cs_c90_advonly.toml

[input]
folder     = "$ATMOSTRANSPORT_DATA_ROOT_quickstart/met/era5_cs_c90_dec2021_f32/"
start_date = "2021-12-01"
end_date   = "2021-12-03"

[architecture]
use_gpu = true

[numerics]
float_type = "Float32"

[run]
scheme = "slopes"

[tracers.co2_bl]
[tracers.co2_bl.init]
# CS supports `uniform | file | netcdf | file_field | catrine_co2`.
# `bl_enhanced` (used by the LL quickstart configs) is LL-only — start
# from a uniform 400 ppm background here.
kind       = "uniform"
background = 4.0e-4

[output]
snapshot_hours = [0, 6, 12, 18, 24, 30, 36, 42, 48, 54, 60, 66, 72]
snapshot_file  = "$ATMOSTRANSPORT_DATA_ROOT_quickstart/output/cs_c90_advonly.nc"
