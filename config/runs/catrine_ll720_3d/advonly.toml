# Catrine LL 720×361 3-day reference — ADVECTION ONLY
#
# LL counterpart to `catrine_c48_3d/` and `catrine_c180_3d/` for the
# plan 40 Commit 7 cross-grid validation. Same physics, same days,
# same tracer IC — only the grid differs. `scripts/validation/compare_cs_vs_ll.jl`
# regrids these snapshots onto the CS grid for per-snapshot diff
# diagnostics.
#
# Uses the ERA5 v4 F64 LL binaries that were the source for the C48
# and C180 regrids, so the three runs share a common met input.
#
# Runner:   julia -t8 --project=. scripts/run_transport.jl \
#               config/runs/catrine_ll720_3d/advonly.toml

[input]
folder       = "~/data/AtmosTransport/met/era5/ll720x361_v4/transport_binary_v2_tropo34_dec2021_f64/"
start_date   = "2021-12-01"
end_date     = "2021-12-03"
# Explicit pattern: the folder also carries `.plan39preclosurefix` backup
# files with matching YYYYMMDD tokens; without this pattern the default
# `\d{8}` scan hits two files per date and errors on "multiple files for
# date ...".
file_pattern = "era5_transport_{YYYYMMDD}_merged1000Pa_float64.bin"

[architecture]
use_gpu = true          # LL720×361 @ F32 fits comfortably on L40S.

[numerics]
float_type = "Float32"

[run]
scheme = "slopes"

[tracers.co2_natural]
[tracers.co2_natural.init]
kind = "catrine_co2"

[tracers.co2_fossil]
[tracers.co2_fossil.init]
kind = "uniform"
background = 0.0

[output]
snapshot_hours = [0, 6, 12, 18, 24, 30, 36, 42, 48, 54, 60, 66, 72]
snapshot_file = "~/data/AtmosTransport/output/catrine_ll720_3d/advonly.nc"
