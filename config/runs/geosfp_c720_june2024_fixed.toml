# ===========================================================================
# GEOS-FP C720 Cubed-Sphere — June 2024 Full Month (FIXED)
#
# Fix: mass_flux_dt = 450 (GEOS dynamics timestep, not 1-hour output interval).
# Previous runs with mass_flux_dt=3600 had 8× too slow transport.
# Uses level merging (merge_above_Pa=3000) + dt=400 for good performance.
# CFL > 1 at thin mesospheric levels is harmless for tropospheric transport.
#
# NetCDF mode reads raw .nc4 files directly from ~/data/geosfp_cs/.
#
# Usage:
#   julia --project=. scripts/run.jl config/runs/geosfp_c720_june2024_fixed.toml
# ===========================================================================

[architecture]
use_gpu    = true
float_type = "Float32"

[grid]
type                  = "cubed_sphere"
Nc                    = 720
met_source            = "geosfp"
merge_levels_above_Pa = 3000.0

[met_data]
driver           = "geosfp_cs"
netcdf_dir       = "~/data/geosfp_cs"
start_date       = "2024-06-01"
end_date         = "2024-06-30"
dt               = 400
met_interval     = 3600
Hp               = 3
mass_flux_dt     = 450

[tracers.co2]
emission      = "edgar"
edgar_version = "v8.0"
year          = 2022
edgar_file    = "/scratch/cfranken/edgar_cs_c720_float32.bin"

[diffusion]
type     = "boundary_layer"
Kz_max   = 100.0
H_scale  = 8.0

[output]
filename      = "/temp1/atmos_transport/output/geosfp_c720_june2024_fixed.nc"
interval      = 3600
output_grid   = "latlon"
Nlon          = 2880
Nlat          = 1449
deflate_level = 4
digits        = 3

[output.fields]
co2_column_mean = {type = "column_mean", species = "co2"}
co2_surface     = {type = "surface_slice", species = "co2"}

[buffering]
strategy = "double"
