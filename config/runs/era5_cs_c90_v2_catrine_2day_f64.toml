# src_v2 cubed-sphere C90 transport-binary config — 2-day Catrine validation
#
# Usage:
#   julia --project=. scripts/run_transport_binary_v2.jl \
#       config/runs/era5_cs_c90_v2_catrine_2day_f64.toml
#
# Prerequisites: generate C90 binaries using:
#   julia --project=. scripts/preprocessing/regrid_latlon_to_cs_binary_v2.jl \
#       --input <latlon_binary> --output <cs_binary> --Nc 90

[input]
binary_paths = [
    "~/data/AtmosTransport/met/era5/cs_c90/transport_binary_v2_tropo34_dec2021_f64/era5_transport_20211201_merged1000Pa_float64.bin",
    "~/data/AtmosTransport/met/era5/cs_c90/transport_binary_v2_tropo34_dec2021_f64/era5_transport_20211202_merged1000Pa_float64.bin",
]

[numerics]
float_type = "Float64"

[run]
scheme = "slopes"
tracer_name = "natural_co2"
start_window = 1
reset_air_mass_each_window = false

[init]
kind = "catrine_co2"

[output]
snapshot_hours = [0, 6, 12, 24, 48]
snapshot_file = "~/data/AtmosTransport/output/src_v2_snapshots/era5_cs_c90_v2_catrine_2day_f64.nc"
