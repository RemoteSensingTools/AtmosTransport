# src_v2 synthetic ReducedGaussian N24 (regular, 4608 cells) 48-hour snapshot
# export — Catrine natural CO2. Matches era5_ll96x48_catrine_48h_f64.toml
# (matched resolution) so results can be compared directly across grids.
#
# Binaries generated by
#   scripts/preprocessing/preprocess_era5_reduced_gaussian_transport_binary_v2.jl
# using config/preprocessing/era5_synthetic_rgN24_transport_binary_v2.toml
# (the :synthetic_reduced_gaussian dispatch — no GRIB file needed).
#
# Usage:
#   julia --project=. scripts/diagnostics/export_transport_v2_snapshots.jl \
#       config/runs/era5_synthetic_rgN24_catrine_48h_f64.toml

[input]
binary_paths = [
    "~/data/AtmosTransport/met/era5/rgN24/transport_binary_v2_tropo34_dec2021_f64/era5_transport_20211201_merged1000Pa_float64.bin",
    "~/data/AtmosTransport/met/era5/rgN24/transport_binary_v2_tropo34_dec2021_f64/era5_transport_20211202_merged1000Pa_float64.bin",
]

[numerics]
float_type = "Float64"

[run]
scheme = "upwind"
tracer_name = "CO2"
reset_air_mass_each_window = false
stop_window = 48

[init]
kind = "catrine_co2"

[output]
snapshot_hours = [0, 6, 12, 24, 36, 48]
snapshot_file = "~/data/AtmosTransport/output/src_v2_snapshots/era5_synthetic_rgN24_catrine_natco2_48h.nc"
