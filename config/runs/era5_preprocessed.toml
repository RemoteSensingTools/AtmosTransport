# ===========================================================================
# ERA5 Preprocessed Mass Fluxes + EDGAR CO2 — Example Run Configuration
#
# Uses pre-computed mass flux binary files (from preprocess_mass_fluxes.jl).
# Fastest path: no wind staggering or flux computation needed.
#
# Usage:
#   using AtmosTransport
#   model = build_model_from_config("config/runs/era5_preprocessed.toml")
#   run!(model)
# ===========================================================================

[architecture]
use_gpu    = true
float_type = "Float32"

[grid]
type       = "latlon"
met_source = "era5"

[met_data]
driver    = "preprocessed_latlon"
directory = "~/data/metDrivers/era5/preprocessed"
# file    = "~/data/metDrivers/era5/massflux_era5_202406_float32.bin"  # single-file mode
dt        = 900

[tracers.co2]
emission      = "edgar"
edgar_version = "v8.0"
year          = 2022

[output]
filename = "~/data/output/era5_preprocessed.nc"
interval = 3600

[output.fields]
co2 = "column_mean"

[buffering]
strategy = "single"
