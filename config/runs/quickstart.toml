# ===========================================================================
# Quickstart demo — GEOS-IT C180 cubed-sphere (~0.5°)
#
# Preprocessed binary data is downloaded automatically as a Julia artifact
# on first run (~700 MB compressed, 1 day of GEOS-IT C180).
#
# Usage:
#   julia --project=. scripts/quickstart.jl
#
# Or manually:
#   julia --project=. scripts/run.jl config/runs/quickstart.toml
#   (requires preprocessed data at the artifact path or a local directory)
# ===========================================================================

[architecture]
use_gpu    = false
float_type = "Float32"

[grid]
type       = "cubed_sphere"
Nc         = 180
met_source = "geosfp"

[met_data]
driver           = "geosfp_cs"
product          = "geosit_c180"
preprocessed_dir = "@artifact:quickstart_met_data"
start_date       = "2023-06-01"
end_date         = "2023-06-01"
dt               = 900
met_interval     = 3600
mass_flux_dt     = 450       # GEOS-IT dynamics timestep [s]
Hp               = 3

[tracers.co2]
emission = "uniform_surface"
species  = "co2"
rate     = 1.0e-8    # kg/m^2/s constant everywhere

[output]
filename    = "quickstart_output.nc"
interval    = 3600
output_grid = "latlon"
Nlon        = 360
Nlat        = 181

[output.fields]
co2_column_mean = {type = "column_mean", species = "co2"}
co2_surface     = {type = "surface_slice", species = "co2"}

[advection]
scheme = "slopes"

[diffusion]
type    = "boundary_layer"
Kz_max  = 100.0
H_scale = 8.0

[buffering]
strategy = "single"
