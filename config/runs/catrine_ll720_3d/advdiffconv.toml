# Catrine LL 720×361 3-day reference — ADVECTION + DIFFUSION + CONVECTION
#
# The LL v4 binary set includes TM5 entu/detu/entd/detd sections when
# `[tm5_convection] enable = true` is set in the preprocessor TOML. Check
# the inspector before running:
#   julia --project=. scripts/diagnostics/inspect_transport_binary.jl \
#       ~/data/AtmosTransport/met/era5/ll720x361_v4/transport_binary_v2_tropo34_dec2021_f64/era5_transport_20211201_merged1000Pa_float64.bin
# If the capability block shows ✓ TM5 convection, this config runs. If ✗,
# regenerate the LL binaries with TM5 enabled (plan 24).
#
# Runner:   julia -t8 --project=. scripts/run_transport.jl \
#               config/runs/catrine_ll720_3d/advdiffconv.toml

[input]
folder       = "~/data/AtmosTransport/met/era5/ll720x361_v4/transport_binary_v2_tropo34_dec2021_f64/"
start_date   = "2021-12-01"
end_date     = "2021-12-03"
file_pattern = "era5_transport_{YYYYMMDD}_merged1000Pa_float64.bin"

[architecture]
use_gpu = true

[numerics]
float_type = "Float32"

[run]
scheme = "slopes"

[tracers.co2_natural]
[tracers.co2_natural.init]
kind = "catrine_co2"

[tracers.co2_fossil]
[tracers.co2_fossil.init]
kind = "uniform"
background = 0.0

[diffusion]
kind  = "constant"
value = 1.0

[convection]
kind = "tm5"

[output]
snapshot_hours = [0, 6, 12, 18, 24, 30, 36, 42, 48, 54, 60, 66, 72]
snapshot_file = "~/data/AtmosTransport/output/catrine_ll720_3d/advdiffconv.nc"
