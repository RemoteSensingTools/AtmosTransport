# ===========================================================================
# ERA5 spectral → GEOS-IT/GMAO C180 cubed-sphere target.
#
# This is the exact GEOS-IT horizontal definition:
#   - GMAO equal-distance gnomonic edge law
#   - GEOS/FV cell_center2 four-corner normalized centers
#   - GEOS native panel order/orientation
#   - -10° longitude offset
#
# Usage for a short validation run:
#   julia -t8 --project=. scripts/preprocessing/preprocess_transport_binary.jl \
#       config/preprocessing/era5_geosit_c180_transport_binary_f32.toml \
#       --day 2021-12-01
#   julia -t8 --project=. scripts/preprocessing/preprocess_transport_binary.jl \
#       config/preprocessing/era5_geosit_c180_transport_binary_f32.toml \
#       --day 2021-12-02
# ===========================================================================

[input]
spectral_dir = "~/data/AtmosTransport/met/era5/0.5x0.5/spectral_hourly"
thermo_dir = "~/data/AtmosTransport/met/era5/0.5x0.5/physics"
coefficients = "config/era5_L137_coefficients.toml"

[output]
directory = "~/data/AtmosTransport/met/era5/geosit_c180/transport_binary_v2_tropo34_dec2021_f32"
include_qv = false
mass_basis = "dry"

[grid]
type = "cubed_sphere"
Nc = 180
panel_convention = "geos_native"
definition = "gmao"
regridder_cache_dir = "~/.cache/AtmosTransport/cr_regridding"
echlevs = "ml137_tropo34"
level_top = 1
level_bot = 137
merge_min_thickness_Pa = 1000.0

[numerics]
float_type = "Float32"
dt = 900.0
met_interval = 3600.0
cs_balance_tol = 1e-14
cs_balance_project_every = 50

[mass_fix]
enable = true
target_ps_dry_pa = 98726.0
qv_global_climatology = 0.00247
