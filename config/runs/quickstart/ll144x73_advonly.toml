# Quickstart: 2.5° (144x73) lat-lon, 3-day advection-only, F32, BL-enhanced IC.
#
# Pairs with the downloadable example bundle (see
# docs/src/getting_started/quickstart.md).
#
# Run:
#   julia --project=. scripts/run_transport.jl \
#       config/runs/quickstart/ll144x73_advonly.toml

[input]
folder     = "$ATMOSTRANSPORT_DATA_ROOT_quickstart/met/era5_ll144x73_dec2021_f32/"
start_date = "2021-12-01"
end_date   = "2021-12-03"

[architecture]
use_gpu = true

[numerics]
float_type = "Float32"

[run]
scheme = "slopes"

[tracers.co2_bl]
[tracers.co2_bl.init]
kind        = "bl_enhanced"
background  = 4.0e-4
enhancement = 1.0e-4
n_layers    = 3

[output]
snapshot_hours = [0, 6, 12, 18, 24, 30, 36, 42, 48, 54, 60, 66, 72]
snapshot_file  = "$ATMOSTRANSPORT_DATA_ROOT_quickstart/output/ll144x73_advonly.nc"
