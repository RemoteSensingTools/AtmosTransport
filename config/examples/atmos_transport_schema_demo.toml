#:schema ../../schemas/atmos_transport_run.schema.json
#
# VS Code / Taplo schema demo for AtmosTransport run configs.
#
# How to try it:
# 1. Install the "Even Better TOML" VS Code extension, which uses Taplo.
# 2. Open this file.
# 3. Hover over fields like `float_type`, `scheme`, `mode`, or
#    `deflate_level` to see descriptions.
# 4. Delete a value inside quotes, press Ctrl+Space, and verify enum
#    completions appear.
#
# This file is a schema demo, not a guaranteed runnable production config.

[input]
folder = "~/data/AtmosTransport/met/era5/cs_c48/transport_binary_v2_tropo34_dec2021_f64/"
start_date = "2021-12-02"
end_date = "2021-12-03"

[architecture]
use_gpu = false

[numerics]
float_type = "Float32"

[run]
scheme = "slopes"

[tracers.co2_natural.init]
kind = "catrine_co2"

[tracers.co2_fossil.init]
kind = "uniform"
background = 0.0

[tracers.co2_fossil.surface_flux]
kind = "gridfed_fossil_co2"
file = "~/data/AtmosTransport/catrine/Emissions/gridfed/GCP-GridFEDv2024.0_2021.short.nc"
time_index = 12

[diffusion]
kind = "constant"
value = 1.0

[convection]
kind = "tm5"

[output]
mode = "single_file"
snapshot_hours = [0, 6, 12, 18, 24, 30, 36, 42, 48, 54, 60, 66, 72]
snapshot_file = "~/data/AtmosTransport/output/schema_demo.nc"
path_template = "~/data/AtmosTransport/output/schema_demo/{date}/snapshot_{date}.nc"
frequency = "6h"
deflate_level = 1
shuffle = true
provenance = true
