# ===========================================================================
# CATRINE D7.1 — ERA5 Spectral 0.5° Lat-Lon (7-Day Comparison)
#
# 4-tracer intercomparison: CO2, fossil CO2, SF6, 222Rn
# Period: 1 Dec 2021 — 7 Dec 2021 (matches ERA5 spectral data availability)
# Met data: ERA5 spectral mass fluxes, preprocessed to 720×361×137
# Output: 3-hourly, full 3D fields + column mass (NetCDF4, Float32)
#
# Protocol: https://www.catrine-project.eu/
#
# Preprocessing:
#   julia --project=. -p 8 scripts/preprocess_spectral_massflux.jl \
#       config/preprocessing/catrine_spectral.toml
#
# Usage:
#   julia --threads=2 --project=. scripts/run.jl config/runs/catrine_era5_spectral.toml
# ===========================================================================

[architecture]
use_gpu    = true
float_type = "Float32"

[grid]
type       = "latlon"
met_source = "era5"
size       = [720, 361, 137]             # 0.5° × 0.5°, full 137 levels

[met_data]
driver    = "preprocessed_latlon"
directory = "/temp1/atmos_transport/era5_spectral_catrine"
dt        = 900                          # advection sub-step [s]

# --- Initial conditions ---
# Uniform values: lat-lon IC vertical interpolation from LSCE (79 levels → 137 ERA5)
# is not yet implemented.  Use spatially-uniform background instead.
# fossil_co2 and rn222 start from zero (no IC entry needed).
[initial_conditions]
co2.uniform_value = 4.1e-4                   # ~410 ppm [mol/mol]
sf6.uniform_value = 1.07e-11                 # ~10.7 ppt [mol/mol]

# --- Tracers ---

[tracers.co2]
emission   = "lmdz_co2"
dir        = "~/data/AtmosTransport/catrine/Emissions/LMDZ_fluxes"
species    = "co2"
flux_var   = "flux_apos"
start_date = "2021-12-01"
end_date   = "2021-12-04"

[tracers.fossil_co2]
emission = "gridfed"
dir      = "~/data/AtmosTransport/catrine/Emissions/gridfed"
species  = "fossil_co2"
year     = 2021

[tracers.sf6]
emission         = "edgar_sf6"
file             = "~/data/AtmosTransport/catrine/Emissions/edgar_v8/v8.0_FT2022_GHG_SF6_2022_TOTALS_emi.nc"
noaa_growth_file = "~/data/AtmosTransport/catrine/Emissions/sf6_gr_gl.txt"
year             = 2022
scale_year       = 2022

[tracers.rn222]
emission   = "zhang_rn222"
dir        = "~/data/AtmosTransport/catrine/Emissions/ZHANG_Rn222/"
chemistry  = "decay"
half_life  = 330350.4                    # 3.8235 days in seconds

# --- Chemistry (222Rn radioactive decay) ---
[chemistry]
type = "composite"

# --- Advection ---
[advection]
scheme    = "ppm"
ppm_order = 7

# --- Convection ---
# NOTE: Tiedtke requires CMFMC in met data. CMFMC is not available in the
# spectral preprocessed data (only mass fluxes). Convection will be silently
# skipped. This means transport differences vs GeosChem will include the
# effect of missing convection.
#[convection]
#type = "tiedtke"

# --- Diffusion ---
# Surface fields (PBLH, USTAR, HFLUX, T2M) merged into the preprocessed file
# via merge_era5_surface_to_massflux.jl. PBL diffusion + PBL emission injection active.
#[diffusion]
#type   = "pbl"
#beta_h = 15.0
#Kz_bg  = 0.1
#Kz_min = 0.01
#Kz_max = 500.0

# --- Output (3-hourly, full 3D + column mass) ---
[output]
filename      = "~/data/AtmosTransport/catrine/output/era5_spectral/catrine_era5_spectral.nc"
interval      = 10800                    # 3 hours
#deflate_level = 4

[output.fields]
co2_3d              = {type = "full_3d", species = "co2"}
fossil_co2_3d       = {type = "full_3d", species = "fossil_co2"}
sf6_3d              = {type = "full_3d", species = "sf6"}
rn222_3d            = {type = "full_3d", species = "rn222"}
co2_column_mass     = {type = "column_mass", species = "co2"}
fco2_column_mass    = {type = "column_mass", species = "fossil_co2"}
sf6_column_mass     = {type = "column_mass", species = "sf6"}
rn222_column_mass   = {type = "column_mass", species = "rn222"}
surface_pressure    = "surface_pressure"
pbl_height          = "pbl_height"

[buffering]
strategy = "double"
