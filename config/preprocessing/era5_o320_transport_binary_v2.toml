# Octahedral reduced-Gaussian O320 — production ERA5 resolution
# 640 rings, 421K cells, 0.28° at equator, no polar CFL problem
#
# Usage:
#   julia -t8 --project=. scripts/preprocessing/preprocess_spectral_v4_binary.jl \
#       config/preprocessing/era5_o320_transport_binary_v2.toml --day 2021-12-01

[input]
spectral_dir = "~/data/AtmosTransport/met/era5/0.5x0.5/spectral_hourly"
thermo_dir = "~/data/AtmosTransport/met/era5/0.5x0.5/physics"
coefficients = "config/era5_L137_coefficients.toml"

[output]
directory = "~/data/AtmosTransport/met/era5/o320/transport_binary_v2_tropo34_dec2021_f64"
include_qv = false
mass_basis = "dry"

[grid]
type = "synthetic_reduced_gaussian"
gaussian_number = 320
nlon_mode = "octahedral"
echlevs = "ml137_tropo34"
level_top = 1
level_bot = 137
merge_min_thickness_Pa = 1000.0

[numerics]
float_type = "Float64"
dt = 900.0
met_interval = 3600.0

[mass_fix]
enable = true
target_ps_dry_pa = 98726.0
qv_global_climatology = 0.00247
