# Catrine C180 3-day test — ADVECTION ONLY
#
# Runner:   julia -t8 --project=. scripts/run_transport.jl \
#               config/runs/catrine_c180_3d/advonly.toml
#
# Part of plan 40 Commit 7 (CS48+CS180 F32 GPU Catrine validation).
# C180 has 6 × 180² = 194 400 cells per level; at Nz=34 that's 6.6 M
# cells, ~55 MB per 3-D field F32. Recommended hardware: wurst L40S
# (F32) or curry A100 (F64 if memory tight).
#
# Prereqs: C180 transport binaries for Dec 1-3 2021 at
#   ~/data/AtmosTransport/met/era5/cs_c180/transport_binary_v2_tropo34_dec2021_f64/
# generated via plan 40 Commit 3's CLI:
#   for d in 01 02 03; do
#     julia -t16 --project=. \
#       scripts/preprocessing/regrid_ll_transport_binary_to_cs.jl \
#       --input  ~/data/AtmosTransport/met/era5/ll720x361_v4/transport_binary_v2_tropo34_dec2021_f64/era5_transport_202112${d}_merged1000Pa_float64.bin \
#       --output ~/data/AtmosTransport/met/era5/cs_c180/transport_binary_v2_tropo34_dec2021_f64/era5_transport_202112${d}_merged1000Pa_float64.bin \
#       --Nc 180
#   done

[input]
folder     = "~/data/AtmosTransport/met/era5/cs_c180/transport_binary_v2_tropo34_dec2021_f64/"
start_date = "2021-12-01"
end_date   = "2021-12-03"

[architecture]
use_gpu = true

[numerics]
float_type = "Float32"

[run]
scheme = "slopes"

[tracers.co2_natural]
[tracers.co2_natural.init]
kind = "catrine_co2"

[tracers.co2_fossil]
[tracers.co2_fossil.init]
kind = "uniform"
background = 0.0

[output]
snapshot_hours = [0, 6, 12, 18, 24, 30, 36, 42, 48, 54, 60, 66, 72]
snapshot_file = "~/data/AtmosTransport/output/catrine_c180_3d/advonly.nc"
