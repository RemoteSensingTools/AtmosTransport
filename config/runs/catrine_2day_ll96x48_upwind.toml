# Catrine 2-day LatLon 96×48 (~3.75°) — Upwind advection
# Baseline comparison run: natural CO2 (Catrine IC, no flux) + fossil CO2 (GridFED)
# Binary: ERA5 spectral v4, 34 merged levels, F64, moist basis

[input]
binary_paths = [
    "~/data/AtmosTransport/met/era5/ll96x48/transport_binary_v2_tropo34_dec2021_f64/era5_transport_20211201_merged1000Pa_float64.bin",
    "~/data/AtmosTransport/met/era5/ll96x48/transport_binary_v2_tropo34_dec2021_f64/era5_transport_20211202_merged1000Pa_float64.bin",
]

[numerics]
float_type = "Float64"

[run]
scheme = "upwind"
start_window = 1
stop_window = 24
reset_air_mass_each_window = false

# Natural CO2: Catrine IC, no surface flux (advection-only baseline)
[tracers.natural_co2.init]
kind = "catrine_co2"

# Fossil CO2: zero IC + GridFED December 2021 emissions
[tracers.fossil_co2.init]
kind = "uniform"
background = 0.0

[tracers.fossil_co2.surface_flux]
kind = "gridfed_fossil_co2"
file = "~/data/AtmosTransport/catrine/Emissions/gridfed/GCP-GridFEDv2024.0_2021.short.nc"
time_index = 12
regridding = "conservative"

[output]
snapshot_hours = [0, 6, 12, 18, 24, 30, 36, 42, 48]
snapshot_file = "~/data/AtmosTransport/output/catrine_2day/ll96x48_upwind.nc"
