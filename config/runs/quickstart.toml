# ===========================================================================
# Quickstart demo — runs on any machine (CPU, no external data needed)
#
# Met data is downloaded automatically as a Julia artifact on first run.
# Uses coarsened GEOS-FP lat-lon data (~4x5 deg, 7 days, ~100 MB).
#
# Usage:
#   julia --project=. scripts/quickstart.jl
#
# Or manually:
#   julia --project=. scripts/run.jl config/runs/quickstart.toml
#   (requires data at ~/data/metDrivers/geosfp/quickstart/ — see quickstart.jl)
# ===========================================================================

[architecture]
use_gpu    = false
float_type = "Float32"

[grid]
type = "latlon"
Nlon = 144
Nlat = 73
Nz   = 72

[met_data]
driver       = "preprocessed_latlon"
directory    = "@artifact:quickstart_met_data"
dt           = 1800
met_interval = 10800

[tracers.co2]
emission = "uniform_surface"
species  = "co2"
rate     = 1.0e-8    # kg/m^2/s constant everywhere

[output]
filename    = "quickstart_output.nc"
interval    = 10800
output_grid = "latlon"
Nlon        = 144
Nlat        = 73

[output.fields]
co2_column_mean = {type = "column_mean", species = "co2"}
co2_surface     = {type = "surface_slice", species = "co2"}

[diffusion]
type   = "boundary_layer"
Kz_max = 100.0
H_scale = 8.0

[buffering]
strategy = "single"
