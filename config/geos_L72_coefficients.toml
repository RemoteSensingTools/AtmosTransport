# ===========================================================================
# NASA GMAO GEOS-5 L72 Model Level Definitions
#
# Hybrid sigma-pressure half-level coefficients:
#   p_half(n) = a[n] + b[n] * p_surface
#
# Used by GEOS-FP, GEOS-IT, and MERRA-2.
#
# Source: GEOS-Chem documentation / pressure_mod.F90
#   https://geos-chem.readthedocs.io/en/latest/supplemental-guides/vertical-grids.html
#   Original GEOS-Chem uses Ap in hPa; values here are converted to Pa.
#
# Convention: n=0 is top of atmosphere, n=72 is the surface.
# Arrays a[] and b[] have 73 entries (half-levels 0..72).
# ===========================================================================

[metadata]
name = "L72"
n_levels = 72
n_interfaces = 73
description = "NASA GMAO GEOS-5 72 model levels (GEOS-FP, GEOS-IT, MERRA-2)"
reference = "https://geos-chem.readthedocs.io/en/latest/supplemental-guides/vertical-grids.html"
p_top_hPa = 0.01

# a coefficients in Pa (half-level interfaces, 73 values for n=0..72)
# Converted from GEOS-Chem Ap (hPa) by multiplying by 100.
# Reversed from bottom-to-top (GEOS-Chem) to top-to-bottom (our convention).
[coefficients]
a = [
