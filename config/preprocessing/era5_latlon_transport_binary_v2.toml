# ERA5 spectral -> src_v2 transport-binary preprocessor config
#
# Quality-first reference path for the standalone src_v2 runtime.
# Produces topology-generic transport binaries on a regular 0.5° lat-lon grid
# with explicit humidity endpoints and forward window deltas.
#
# Usage:
#   julia -t8 --project=. scripts/preprocessing/preprocess_era5_latlon_transport_binary_v2.jl #       config/preprocessing/era5_latlon_transport_binary_v2.toml --day 2021-12-01

[input]
spectral_dir = "~/data/AtmosTransport/met/era5/0.5x0.5/spectral_hourly"
thermo_dir = "~/data/AtmosTransport/met/era5/0.5x0.5/physics"
coefficients = "config/era5_L137_coefficients.toml"

[output]
directory = "~/data/AtmosTransport/met/era5/0.5x0.5/transport_binary_v2_tropo34_dec2021_f64"
include_qv = true
mass_basis = "moist"

[grid]
type = "latlon"
nlon = 720
nlat = 361
level_top = 1
level_bot = 137
echlevs = "ml137_tropo34"
merge_min_thickness_Pa = 1000.0

[numerics]
float_type = "Float64"
dt = 900.0
met_interval = 3600.0

[mass_fix]
enable = false
