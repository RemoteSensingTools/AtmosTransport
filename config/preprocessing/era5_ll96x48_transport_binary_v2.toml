# Coarse lat-lon (96 x 48) ERA5 spectral -> v4 daily binary.
# 3.75 deg x 3.75 deg = 4608 cells — matched cell count with
# config/preprocessing/era5_synthetic_rgN24_transport_binary_v2.toml
# so LL vs RG runs on the same resolution are directly comparable.
#
# Usage (preprocess a single day):
#   julia --project=. scripts/preprocessing/preprocess_spectral_v4_binary.jl \
#       config/preprocessing/era5_ll96x48_transport_binary_v2.toml --day 2021-12-01

[input]
spectral_dir = "~/data/AtmosTransport/met/era5/0.5x0.5/spectral_hourly"
coefficients = "config/era5_L137_coefficients.toml"

[output]
directory = "~/data/AtmosTransport/met/era5/ll96x48/transport_binary_v2_tropo34_dec2021_f64"

[grid]
type = "latlon"
nlon = 96
nlat = 48
level_top = 1
level_bot = 137
echlevs = "ml137_tropo34"
merge_min_thickness_Pa = 1000.0  # fallback, not used with echlevs

[numerics]
float_type = "Float64"
dt = 900.0
met_interval = 3600.0

# TM5-style global mean ps fix — pin DRY atmospheric mass each window.
# See era5_spectral_v4_tropo34_dec2021.toml for full notes on the target.
[mass_fix]
enable = true
target_ps_dry_pa = 98726.0
qv_global_climatology = 0.00247
