# Catrine 2-day Cubed-Sphere C90 — Lin-Rood (fv_tp_2d) advection
# Natural CO2 (Catrine IC) + Fossil CO2 (GridFED) with 6-hourly snapshots
#
# Lin-Rood eliminates directional splitting error at CS panel boundaries
# by averaging X-first and Y-first PPM orderings from the original field.
# Requires halo_padding >= 3 for PPM stencil.

[input]
binary_paths = [
    "~/data/AtmosTransport/met/era5/C90/transport_binary_v2_tropo34_dec2021_f64/era5_transport_v2_cs90_20211201_float64.bin",
    "~/data/AtmosTransport/met/era5/C90/transport_binary_v2_tropo34_dec2021_f64/era5_transport_v2_cs90_20211202_float64.bin",
]

[numerics]
float_type = "Float64"

[run]
scheme = "linrood"
start_window = 1
stop_window = 24
reset_air_mass_each_window = false
halo_padding = 3
ppm_order = 5

[tracers.natural_co2.init]
kind = "catrine_co2"

[tracers.fossil_co2.init]
kind = "uniform"
background = 0.0

[tracers.fossil_co2.surface_flux]
kind = "gridfed_fossil_co2"
file = "~/data/AtmosTransport/catrine/Emissions/gridfed/GCP-GridFEDv2024.0_2021.short.nc"
time_index = 12

[output]
snapshot_hours = [0, 6, 12, 18, 24, 30, 36, 42, 48]
snapshot_file = "~/data/AtmosTransport/output/catrine_2day/cs_linrood.nc"
