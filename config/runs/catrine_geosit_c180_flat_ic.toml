# ===========================================================================
# CATRINE D7.1 — GEOS-IT C180 Cubed-Sphere — FLAT IC TEST
#
# Same as catrine_geosit_c180.toml but with uniform initial conditions
# to diagnose first-timestep blow-up with structured ICs.
#
# CO2 = 4.17e-4 mol/mol (≈417 ppm), SF6 = 1.05e-11 mol/mol (≈10.5 ppt)
# Period: 2 days only (Dec 1-3, 2021)
# ===========================================================================

[architecture]
use_gpu    = true
float_type = "Float32"

[grid]
type       = "cubed_sphere"
met_source = "geosfp"
Nc         = 180

[met_data]
driver           = "geosfp_cs"
product          = "geosit_c180"
netcdf_dir       = "~/data/geosit_c180_catrine"
preprocessed_dir = "/temp1/catrine/met/geosit_c180/massflux"
surface_data_bin_dir = "/temp1/catrine/met/geosit_c180/surface_bin"
coord_file       = "~/code/gitHub/AtmosTransportModel/data/grids/cs_c180_gridspec.nc"
start_date       = "2021-12-01"
end_date         = "2021-12-03"
dt               = 300
met_interval     = 3600
mass_flux_dt     = 450
Hp               = 3

# --- Initial conditions (FLAT / UNIFORM) ---
[initial_conditions]
co2.uniform_value = 4.17e-4    # mol/mol (≈417 ppm)
sf6.uniform_value = 1.05e-11   # mol/mol (≈10.5 ppt)

# --- Tracers ---

[tracers.co2]
emission   = "lmdz_co2"
file       = "~/data/AtmosTransport/catrine/preprocessed_c180/lmdz_co2_cs_c180_float32.bin"
species    = "co2"
flux_var   = "flux_apos"
start_date = "2021-12-01"
end_date   = "2023-12-31"

[tracers.fossil_co2]
emission = "gridfed"
file     = "~/data/AtmosTransport/catrine/preprocessed_c180/gridfed_fossil_co2_cs_c180_float32.bin"
species  = "fossil_co2"
year     = 2021

[tracers.sf6]
emission         = "edgar_sf6"
file             = "~/data/AtmosTransport/catrine/preprocessed_c180/edgar_sf6_cs_c180_float32.bin"
noaa_growth_file = "~/data/AtmosTransport/catrine/Emissions/sf6_gr_gl.txt"
year             = 2022
scale_year       = 2022

[tracers.rn222]
emission  = "zhang_rn222"
file      = "~/data/AtmosTransport/catrine/preprocessed_c180/zhang_rn222_cs_c180_float32.bin"
chemistry = "decay"
half_life = 330350.4

# --- Chemistry (222Rn radioactive decay) ---
[chemistry]
type = "composite"

# --- Advection ---
[advection]
scheme    = "slopes"

# --- Diffusion ---
[diffusion]
type   = "pbl"
beta_h = 15.0
Kz_bg  = 0.1
Kz_min = 0.01
Kz_max = 500.0

# --- Output ---
[output]
filename      = "~/data/AtmosTransport/catrine/output/geosit_c180_flat_ic/catrine_flat_ic"
format        = "binary"
split         = "daily"
interval      = 10800

[output.fields]
sf6_3d           = {type = "full_3d", species = "sf6"}
fossil_co2_3d    = {type = "full_3d", species = "fossil_co2"}
co2_3d           = {type = "full_3d", species = "co2"}
rn222_3d         = {type = "full_3d", species = "rn222"}
sf6_column_mass  = {type = "column_mass", species = "sf6"}
fco2_column_mass = {type = "column_mass", species = "fossil_co2"}
co2_column_mass  = {type = "column_mass", species = "co2"}
rn222_column_mass = {type = "column_mass", species = "rn222"}
surface_pressure = "surface_pressure"
pbl_height       = "pbl_height"

[buffering]
strategy = "double"
