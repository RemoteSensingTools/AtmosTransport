# ERA5 v4 hourly binary test — 13-window advection-only debug at window 13
[architecture]
use_gpu    = true
float_type = "Float32"

[grid]
type       = "latlon"
met_source = "era5"
size       = [720, 361, 18]

[met_data]
driver       = "preprocessed_latlon"
directory    = "/temp1/atmos_transport/era5_v4_5000Pa"
qv_directory = "~/data/AtmosTransport/met/era5/physics"
dt           = 900
max_windows  = 13

[initial_conditions]
co2.file     = "~/data/AtmosTransport/catrine/InitialConditions/startCO2_202112010000.nc"
co2.variable = "CO2"

[tracers.co2]
emission = "none"
species  = "co2"

[advection]
scheme              = "slopes"
enable_flux_delta   = true
use_mass_cfl_pilot  = true
debug_first_window  = false
debug_window        = 13
debug_all_substeps  = true

[output]
filename = "/tmp/era5_v4_advonly_13win_debug13.nc"
interval = 21600

[output.fields]
co2_surface     = {type = "surface_slice", species = "co2"}
co2_column_mean = {type = "column_mean", species = "co2"}

[buffering]
strategy = "double"
