# ERA5 F64 debug run — TM5-faithful moist path, v4 binary
#
# Same as era5_f64_debug_moist.toml but pointing at the v4-generated binary
# directory instead of the broken old monthly binary. The v4 binary is
# produced by preprocess_spectral_v4_binary.jl which uses TM5's
# recompute_cm_from_divergence! so cm exactly satisfies continuity with am/bm.
#
# Goals per ToClaude.md:
#   - Float64 on A100
#   - mass_fixer = false (prove mass stepping keeps m positive)
#   - No dry-IC correction (moist basis)
#   - No QV loading (moist rm/m output)
#   - Diagnostic slopes initially
#   - No emissions / diffusion / convection / chemistry
#   - Single tracer (co2)
#
# Acceptance criteria:
#   - Uniform 411 ppm IC preserved to machine precision
#   - No NaN, no negative m
#   - check_global_cfl_and_scale! pre-pass converges in 0-2 halvings (not 5)
#
# Run:
#   ATMOSTRANSPORT_DEBUG_SWEEPS=1 julia --threads=2 --project=. \
#     scripts/run.jl config/runs/era5_f64_debug_moist_v4.toml

[architecture]
use_gpu    = true
float_type = "Float64"

[grid]
type       = "latlon"
met_source = "era5"
size       = [720, 361, 34]   # tropo34 — 34 layers (TM5 r1112 ml137_tropo34)

[met_data]
driver       = "preprocessed_latlon"
# Directory of v4 daily binaries — picked up by find_massflux_shards.
# Generated by preprocess_spectral_v4_binary.jl with
# config/preprocessing/era5_spectral_v4_tropo34_dec2021.toml
directory    = "~/data/AtmosTransport/met/era5/spectral_v4_tropo34_dec2021"
disable_qv   = true          # moist basis, no QV loading
dt           = 900
max_windows  = 1             # one window for instrumentation

[initial_conditions]
dry_ic            = false    # moist IC
co2.uniform_value = 411e-6

[tracers.co2]
emission = "none"
species  = "co2"

[advection]
scheme            = "slopes"
prognostic_slopes = false    # diagnostic slopes (revisit after mass path stable)
mass_fixer        = false    # TM5-faithful: no fixer

[output]
filename = "/tmp/era5_f64_debug_moist_v4.nc"
interval = 10800             # 3 hourly

[output.fields]
co2_surface     = {type = "surface_slice", species = "co2"}
co2_column_mean = {type = "column_mean", species = "co2"}

[buffering]
strategy = "double"
