# src_v2 transport-binary sequence runner config
#
# Example usage:
#   julia --project=. scripts/run_transport_binary_v2.jl #       config/runs/era5_latlon_transport_v2_dec2021.toml
#
# Add a second day to [input].binary_paths for a 2-day carry-forward run.

[input]
binary_paths = [
    "~/data/AtmosTransport/met/era5/0.5x0.5/transport_binary_v2_tropo34_dec2021_f64/era5_transport_v2_20211201_merged1000Pa_float64.bin",
]

[numerics]
float_type = "Float64"

[run]
scheme = "upwind"
tracer_name = "CO2"
start_window = 1
# stop_window = 24

[init]
kind = "gaussian_blob"
background = 4.0e-4
amplitude = 4.0e-4
lon0_deg = 0.0
lat0_deg = 0.0
sigma_lon_deg = 12.0
sigma_lat_deg = 8.0
