# Plan 24 Commit 4 real-data smoke: ERA5 LL 720x361, tropo34, dry
# basis, TM5 convection ENABLED.  Float32 to match the Commit-2
# physics BIN payload (FT assertion in compute_tm5_merged_hour_on_source!).
#
# Prerequisites:
#   1. ERA5 spectral GRIB for the day(s) at spectral_dir.
#   2. ERA5 thermo ML NC at thermo_dir.
#   3. ERA5 physics BIN at tm5_physics_bin_dir — build via
#      scripts/preprocessing/convert_era5_physics_nc_to_bin.jl.
#
# Usage:
#   julia -t8 --project=. scripts/preprocessing/preprocess_transport_binary.jl \
#       config/preprocessing/era5_ll720x361_tm5_dec2021_smoke.toml --day 2021-12-02

[input]
spectral_dir = "~/data/AtmosTransport/met/era5/0.5x0.5/spectral_hourly"
thermo_dir   = "~/data/AtmosTransport/met/era5/0.5x0.5/physics"
coefficients = "config/era5_L137_coefficients.toml"

[output]
directory  = "/temp1/tm5_smoke/transport_bin"
mass_basis = "dry"
include_qv = false

[grid]
type                   = "latlon"
nlon                   = 720
nlat                   = 361
level_top              = 1
level_bot              = 137
echlevs                = "ml137_tropo34"
merge_min_thickness_Pa = 1000.0

[numerics]
float_type   = "Float32"
dt           = 900.0
met_interval = 3600.0

[mass_fix]
enable                = true
target_ps_dry_pa      = 98726.0
qv_global_climatology = 0.00247

[tm5_convection]
enable          = true
physics_bin_dir = "/temp1/met/era5/0.5x0.5/physics_bin"
