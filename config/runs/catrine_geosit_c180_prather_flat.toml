# Prather CS test: uniform CO2 = 400 ppm, Strang splitting (no GCHP path).
# Tests prognostic slopes on cubed-sphere — deviation from 400 ppm reveals transport artifacts.

[architecture]
use_gpu    = true
float_type = "Float32"

[grid]
type       = "cubed_sphere"
met_source = "geosfp"
Nc         = 180

[met_data]
driver           = "geosfp_cs"
product          = "geosit_c180"
netcdf_dir       = "~/data/geosit_c180_catrine"
preprocessed_dir = "~/data/AtmosTransport/met/geosit_c180/preprocessed/massflux"
surface_data_bin_dir = "~/data/AtmosTransport/met/geosit_c180/preprocessed/physics"
coord_file       = "~/data/AtmosTransport/grids/cs_c180_gridspec.nc"
start_date       = "2021-12-01"
end_date         = "2021-12-03"
dt               = 450
met_interval     = 3600
mass_flux_dt     = 450
Hp               = 3

[initial_conditions]
co2.uniform_value = 0.0004

[tracers.co2]

[advection]
scheme       = "prather"
use_limiter  = true
mass_fixer   = true

[output]
filename      = "~/data/AtmosTransport/output/gchp_flat/catrine_prather_flat"
format        = "binary"
auto_convert  = true
split         = "daily"
interval      = 10800

[output.fields]
co2_3d           = {type = "full_3d", species = "co2"}
co2_column_mass  = {type = "column_mass", species = "co2"}
surface_pressure = "surface_pressure"

[buffering]
strategy = "single"
