# ===========================================================================
# Pure advection test: uniform IC, no emissions, no physics
# Pressure fixer removed; cm from pure mass-flux continuity.
# Fixer timing fix: m_ref advance before fixer. IC uses dry mass when QV loaded.
# ===========================================================================

[architecture]
use_gpu    = true
float_type = "Float32"

[grid]
type       = "cubed_sphere"
met_source = "geosfp"
Nc         = 180

[met_data]
driver           = "geosfp_cs"
product          = "geosit_c180"
netcdf_dir       = "~/data/geosit_c180_catrine"
preprocessed_dir = "/temp2/catrine-runs/met/geosit_c180"
surface_data_bin_dir = "/temp1/catrine/met/geosit_c180/surface_bin"
coord_file       = "~/code/gitHub/AtmosTransportModel/data/grids/cs_c180_gridspec.nc"
start_date       = "2021-12-01"
end_date         = "2021-12-08"
dt               = 300
met_interval     = 3600
mass_flux_dt     = 450
Hp               = 3

[initial_conditions]
co2.uniform_value = 400e-6

[tracers.co2]
emission = "none"
species  = "co2"

[advection]
scheme         = "ppm"
ppm_order      = 7
damp_coeff     = 0.02
linrood        = false
mass_fixer     = true
dry_correction = true

[output]
filename      = "/temp2/catrine-runs/output/c180_uniform_advonly_dryfix"
format        = "binary"
split         = "daily"
interval      = 10800
auto_convert  = true

[output.fields]
co2_3d           = {type = "full_3d", species = "co2"}
co2_column_mass  = {type = "column_mass", species = "co2"}
surface_pressure = "surface_pressure"

[buffering]
strategy = "double"
