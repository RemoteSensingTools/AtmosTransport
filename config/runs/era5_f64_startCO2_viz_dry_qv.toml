# ERA5 F64 v4 dry-basis binary — non-uniform CO2 IC, 24h, 3-field output
#
# Legacy runtime (`src/`) only. Uses the dry-basis + embedded-QV binary from
# the new preprocessor, but keeps the advection/output path on the existing
# `scripts/run.jl` / `src/IO` / `src/Models` stack.

[architecture]
use_gpu    = true
float_type = "Float64"

[grid]
type       = "latlon"
met_source = "era5"
size       = [720, 361, 137]

[met_data]
driver             = "preprocessed_latlon"
directory          = "~/data/AtmosTransport/met/era5/0.5x0.5/preprocessed/massflux/v4_137L_smoketest_dry_qv"
disable_qv         = false
disable_flux_delta = false
dt                 = 900
max_windows        = 24

[initial_conditions]
file = "~/data/AtmosTransport/catrine/InitialConditions/startCO2_202112010000.nc"
co2  = "CO2"

[tracers.co2]
emission = "none"
species  = "co2"

[advection]
scheme            = "slopes"
prognostic_slopes = false
mass_fixer        = true

[output]
filename = "/tmp/era5_f64_startCO2_viz_dry_qv.nc"
interval = 3600

[output.fields]
co2_surface     = {type = "surface_slice", species = "co2"}
co2_750hPa      = {type = "sigma_level", species = "co2", sigma = 0.74}
co2_column_mean = {type = "column_mean", species = "co2"}

[buffering]
strategy = "double"
