# ===========================================================================
# CATRINE D7.1 — GEOS-IT C180 Cubed-Sphere (Advection-only test)
#
# Same as catrine_geosit_c180_ord7damp.toml but with:
#   - NO convection
#   - NO diffusion
#   - Advection only (PPM ORD=7 + damp_coeff=0.02)
#   - Purpose: isolate advection behavior without mass fixer artifacts
#     from convection/diffusion interactions
#
# Usage:
#   using CUDA
#   using AtmosTransport
#   model = build_model_from_config("config/runs/catrine_geosit_c180_advonly.toml")
#   run!(model)
# ===========================================================================

[architecture]
use_gpu    = true
float_type = "Float32"

[grid]
type       = "cubed_sphere"
met_source = "geosfp"
Nc         = 180

[met_data]
driver           = "geosfp_cs"
product          = "geosit_c180"
netcdf_dir       = "~/data/geosit_c180_catrine"
preprocessed_dir = "/temp2/catrine-runs/met/geosit_c180"
surface_data_bin_dir = "/temp1/catrine/met/geosit_c180/surface_bin"
coord_file       = "~/code/gitHub/AtmosTransportModel/data/grids/cs_c180_gridspec.nc"
start_date       = "2021-12-01"
end_date         = "2021-12-31"
dt               = 300                   # advection sub-step [s]
met_interval     = 3600                  # 1-hour met updates
mass_flux_dt     = 450                   # dynamics timestep (NOT met interval)
Hp               = 3

# --- Initial conditions ---
[initial_conditions]
co2.file     = "~/data/AtmosTransport/catrine/InitialConditions/startCO2_202112010000.nc"
co2.variable = "CO2"
sf6.file     = "~/data/AtmosTransport/catrine/InitialConditions/startSF6_202112010000.nc"
sf6.variable = "SF6"

# --- Tracers ---

[tracers.co2]
emission   = "lmdz_co2"
file       = "~/data/AtmosTransport/catrine/preprocessed_c180/lmdz_co2_cs_c180_float32.bin"
species    = "co2"
flux_var   = "flux_apos"
start_date = "2021-12-01"
end_date   = "2023-12-31"

[tracers.fossil_co2]
emission = "gridfed"
file     = "~/data/AtmosTransport/catrine/preprocessed_c180/gridfed_fossil_co2_cs_c180_float32.bin"
species  = "fossil_co2"
year     = 2021

[tracers.sf6]
emission         = "edgar_sf6"
file             = "~/data/AtmosTransport/catrine/preprocessed_c180/edgar_sf6_cs_c180_float32.bin"
noaa_growth_file = "~/data/AtmosTransport/catrine/Emissions/sf6_gr_gl.txt"
year             = 2022
scale_year       = 2022

[tracers.rn222]
emission  = "zhang_rn222"
file      = "~/data/AtmosTransport/catrine/preprocessed_c180/zhang_rn222_cs_c180_float32.bin"
chemistry = "decay"
half_life = 330350.4                    # 3.8235 days in seconds

# --- Chemistry (222Rn radioactive decay) ---
[chemistry]
type = "composite"

# --- Advection (PPM ORD=7 + divergence damping) ---
[advection]
scheme     = "ppm"
ppm_order  = 7
damp_coeff = 0.02

# --- NO convection ---
# --- NO diffusion ---

# --- Output (3-hourly, native CS binary, daily files) ---
[output]
filename      = "/temp2/catrine-runs/output/catrine_geosit_c180_advonly"
format        = "binary"
split         = "daily"
interval      = 10800                    # 3 hours

[output.fields]
sf6_3d           = {type = "full_3d", species = "sf6"}
fossil_co2_3d    = {type = "full_3d", species = "fossil_co2"}
co2_3d           = {type = "full_3d", species = "co2"}
rn222_3d         = {type = "full_3d", species = "rn222"}
sf6_column_mass  = {type = "column_mass", species = "sf6"}
fco2_column_mass = {type = "column_mass", species = "fossil_co2"}
co2_column_mass  = {type = "column_mass", species = "co2"}
rn222_column_mass = {type = "column_mass", species = "rn222"}
sf6_emission     = {type = "emission_flux", species = "sf6"}
fco2_emission    = {type = "emission_flux", species = "fossil_co2"}
surface_pressure = "surface_pressure"
pbl_height       = "pbl_height"

[buffering]
strategy = "double"
