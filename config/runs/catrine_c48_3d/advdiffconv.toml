# Catrine C48 3-day test — ADVECTION + DIFFUSION + CONVECTION
#
# Operator stack: slopes advection + constant-Kz ImplicitVerticalDiffusion
# + TM5Convection (plan 23). TM5 reads entu/detu/entd/detd directly from
# each transport window.
#
# STATUS — DOES NOT RUN TODAY.
#
# `scripts/preprocessing/regrid_ll_transport_binary_to_cs.jl` (plan 40
# Commit 3, a thin CLI over `Preprocessing.regrid_ll_binary_to_cs`) does
# NOT carry TM5 convection sections across the LL→CS regrid. A C48 binary
# produced by that CLI has payload_sections = {m, am, bm, cm, ps}, and
# the recipe validator in `_validate_capability_match` will reject
# `[convection] kind = "tm5"` up front with a precise "binary lacks
# entu/detu/entd/detd" message.
#
# To make this config runnable, one of:
#   (a) extend `regrid_ll_binary_to_cs` to conservatively regrid the
#       LL binary's entu/detu/entd/detd sections, regenerate C48
#       binaries from a TM5-enabled LL source.
#   (b) switch to `kind = "cmfmc"` with a GEOS-style C48 binary that
#       carries cmfmc+dtrain (no such binary exists today).
#
# Runner:   julia -t8 --project=. scripts/run_transport.jl \
#               config/runs/catrine_c48_3d/advdiffconv.toml

[input]
folder     = "~/data/AtmosTransport/met/era5/cs_c48/transport_binary_v2_tropo34_dec2021_f64/"
start_date = "2021-12-01"
end_date   = "2021-12-03"

[architecture]
use_gpu = true

[numerics]
float_type = "Float32"

[run]
scheme = "slopes"

[tracers.co2_natural]
[tracers.co2_natural.init]
kind = "catrine_co2"

[tracers.co2_fossil]
[tracers.co2_fossil.init]
kind = "uniform"
background = 0.0

[diffusion]
kind  = "constant"
value = 1.0

# TM5Convection has no tuning knobs — operator reads entu/detu/entd/detd
# from each transport window. Will error at recipe validation until the
# CS regridder passes those sections through (see STATUS above).
[convection]
kind = "tm5"

[output]
snapshot_hours = [0, 6, 12, 18, 24, 30, 36, 42, 48, 54, 60, 66, 72]
snapshot_file = "~/data/AtmosTransport/output/catrine_c48_3d/advdiffconv.nc"
