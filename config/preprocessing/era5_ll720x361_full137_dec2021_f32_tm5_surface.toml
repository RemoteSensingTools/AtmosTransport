# ERA5 spectral -> LL 720x361 transport binary on all native L137 layers.
#
# This is the full-physics source for regenerating ERA5-based C180 binaries:
#   1. Build this LL binary with TM5 convection + PBL surface fields.
#   2. Regrid it to C180 with scripts/preprocessing/regrid_ll_transport_binary_to_cs.jl.
#
# Usage:
#   julia -t16 --project=. scripts/preprocessing/preprocess_transport_binary.jl \
#       config/preprocessing/era5_ll720x361_full137_dec2021_f32_tm5_surface.toml \
#       --day 2021-12-02

[input]
spectral_dir = "~/data/AtmosTransport/met/era5/0.5x0.5/spectral_hourly"
thermo_dir   = "~/data/AtmosTransport/met/era5/0.5x0.5/physics"
surface_dir  = "~/data/AtmosTransport/met/era5/0.5x0.5/surface"
coefficients = "config/era5_L137_coefficients.toml"

[output]
directory  = "~/data/AtmosTransport/met/era5/ll720x361_v4/transport_binary_v2_full137_dec2021_f32_tm5_surface"
mass_basis = "dry"
include_qv = false

[grid]
type                   = "latlon"
nlon                   = 720
nlat                   = 361
level_top              = 1
level_bot              = 137
echlevs                = "ml137_full"
merge_min_thickness_Pa = 1000.0

[numerics]
float_type   = "Float32"
dt           = 900.0
met_interval = 3600.0

[mass_fix]
enable                = true
target_ps_dry_pa      = 98726.0
qv_global_climatology = 0.00247

[surface]
enable = true

[tm5_convection]
enable          = true
physics_bin_dir = "~/data/AtmosTransport/met/era5/0.5x0.5/physics_bin"
