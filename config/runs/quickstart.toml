# ===========================================================================
# Quickstart demo — GEOS-IT C180 cubed-sphere (~0.5°), 12-hour CO₂ transport
#
# Data setup (one-time):
#   1. Download the quickstart tarball (~1.4 GB) from:
#      https://github.com/RemoteSensingTools/AtmosTransport/releases/tag/data-v1
#   2. Extract:
#      mkdir -p ~/data/AtmosTransport
#      tar -xzf quickstart_met_data.tar.gz -C ~/data/AtmosTransport/
#
# Run:
#   julia --project=. scripts/quickstart.jl
# Or directly:
#   julia --project=. scripts/run.jl config/runs/quickstart.toml
# ===========================================================================

[architecture]
use_gpu    = true
float_type = "Float32"

[grid]
type       = "cubed_sphere"
Nc         = 180
met_source = "geosfp"

[met_data]
driver           = "geosfp_cs"
product          = "geosit_c180"
preprocessed_dir = "~/data/AtmosTransport/quickstart_build/quickstart_met_data"
start_date       = "2023-06-01"
end_date         = "2023-06-01"
dt               = 900
met_interval     = 3600
mass_flux_dt     = 450       # GEOS-IT dynamics timestep [s]
Hp               = 3

[tracers.co2]
emission      = "edgar"
edgar_version = "v8.0"
species       = "co2"
year          = 2022
edgar_file    = "~/data/AtmosTransport/quickstart_build/quickstart_met_data/edgar_co2_cs_c180_float32.bin"

[output]
filename    = "quickstart_output.nc"
interval    = 3600
output_grid = "latlon"
Nlon        = 360
Nlat        = 181

[output.fields]
co2_column_mean = {type = "column_mean", species = "co2"}
co2_surface     = {type = "surface_slice", species = "co2"}

[advection]
scheme = "slopes"

[diffusion]
type    = "boundary_layer"
Kz_max  = 100.0
H_scale = 8.0

[buffering]
strategy = "single"
