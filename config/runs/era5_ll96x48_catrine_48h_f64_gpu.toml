# src_v2 LatLon 96x48 48h Catrine — F64 GPU (CUDA).
# Uses the same F64 binary as the CPU variant; runtime FT=Float64 on
# device. On wurst's L40S, F64 throughput is ~1.4 TFLOPS (vs 91 TFLOPS
# F32), so this is a correctness test rather than a speed test.

[input]
binary_paths = [
    "~/data/AtmosTransport/met/era5/ll96x48/transport_binary_v2_tropo34_dec2021_f64/era5_transport_20211201_merged1000Pa_float64.bin",
    "~/data/AtmosTransport/met/era5/ll96x48/transport_binary_v2_tropo34_dec2021_f64/era5_transport_20211202_merged1000Pa_float64.bin",
]

[numerics]
float_type = "Float64"

[architecture]
use_gpu = true

[run]
scheme = "upwind"
tracer_name = "CO2"
reset_air_mass_each_window = false
stop_window = 48

[init]
kind = "catrine_co2"

[output]
snapshot_hours = [0, 6, 12, 24, 36, 48]
snapshot_file = "~/data/AtmosTransport/output/src_v2_snapshots/era5_ll96x48_catrine_natco2_48h_f64_gpu.nc"
