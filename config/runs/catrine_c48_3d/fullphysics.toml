# Catrine C48 3-day test — FULL PHYSICS (advection + diffusion + convection)
#
# Operator stack: slopes advection + constant-Kz ImplicitVerticalDiffusion
# + TM5Convection.
#
# STATUS — DOES NOT RUN TODAY (TM5 gap; see advdiffconv.toml notes).
#
# NOTE — CS runner does NOT apply surface fluxes today. The structured
# (LL/RG) `run_driven_simulation` path builds `surface_sources` via
# `build_surface_flux_sources` and threads them into `DrivenSimulation`
# (see src/Models/DrivenRunner.jl:487), but `_run_driven_simulation_cs`
# never calls that builder. Until that wiring lands, a
# `[tracers.co2_fossil.surface_flux]` block on a CS config would silently
# have no effect — so this config omits the block and `co2_fossil` stays
# at its uniform background. The LL counterpart
# `catrine_ll720_3d/fullphysics.toml` keeps surface emissions active
# (LL runner handles them).
#
# Runner:   julia -t8 --project=. scripts/run_transport.jl \
#               config/runs/catrine_c48_3d/fullphysics.toml

[input]
folder     = "~/data/AtmosTransport/met/era5/cs_c48/transport_binary_v2_tropo34_dec2021_f64/"
start_date = "2021-12-01"
end_date   = "2021-12-03"

[architecture]
use_gpu = true

[numerics]
float_type = "Float32"

[run]
scheme = "slopes"

[tracers.co2_natural]
[tracers.co2_natural.init]
kind = "catrine_co2"

[tracers.co2_fossil]
[tracers.co2_fossil.init]
kind = "uniform"
background = 0.0

# [tracers.co2_fossil.surface_flux] omitted on CS — see STATUS note above.

[diffusion]
kind  = "constant"
value = 1.0

[convection]
kind = "tm5"

[output]
snapshot_hours = [0, 6, 12, 18, 24, 30, 36, 42, 48, 54, 60, 66, 72]
snapshot_file = "~/data/AtmosTransport/output/catrine_c48_3d/fullphysics.nc"
