# ===========================================================================
# GEOS-IT C180 native → AtmosTransport v4 CS C180 transport binary.
#
# Passthrough preprocessing: source mesh == target mesh, no horizontal
# regrid, no Poisson balance. Stored mass uses FV3's pressure-fixer chained
# evolution (see src/Preprocessing/transport_binary/cubed_sphere_geos.jl
# module header for rationale).
#
# Usage:
#   julia -t8 --project=. scripts/preprocessing/preprocess_transport_binary.jl \
#       config/preprocessing/geosit_c180_to_cs180.toml \
#       --start 2021-12-01 --end 2021-12-03
# ===========================================================================

[source]
toml     = "config/met_sources/geosit.toml"
root_dir = "~/data/AtmosTransport/met/geosit/C180/raw_catrine"

[output]
directory  = "~/data/AtmosTransport/met/geosit/C180/preprocessed/v4_dec2021"
mass_basis = "dry"

[grid]
type                = "cubed_sphere"
Nc                  = 180
panel_convention    = "geos_native"
regridder_cache_dir = "~/.cache/AtmosTransport/cr_regridding"

[vertical]
coefficients = "config/geos_L72_coefficients.toml"
# All 72 layers; no merging (passthrough preserves source resolution).

[numerics]
float_type     = "Float64"
dt_met_seconds = 3600.0     # GEOS-IT CTM cadence (hourly)
