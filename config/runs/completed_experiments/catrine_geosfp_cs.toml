# ===========================================================================
# CATRINE D7.1 — GEOS-FP Cubed-Sphere Configuration
#
# 4-tracer intercomparison: CO2, fossil CO2, SF6, 222Rn
# Period: 1 Dec 2021 (spin-up) — 31 Dec 2023
# Met data: GEOS-FP C720, cubed-sphere mass fluxes
# Output: 3-hourly, regridded to lat-lon (NetCDF4, Float32)
#
# Protocol: https://www.catrine-project.eu/
#
# Usage:
#   using CUDA
#   using AtmosTransport
#   model = build_model_from_config("config/runs/catrine_geosfp_cs.toml")
#   run!(model)
# ===========================================================================

[architecture]
use_gpu    = true
float_type = "Float32"

[grid]
type       = "cubed_sphere"
met_source = "geosfp"
Nc         = 720

[met_data]
driver           = "geosfp_cs"
preprocessed_dir = "~/data/geosfp_cs/preprocessed"
start_date       = "2021-12-01"
end_date         = "2023-12-31"
dt               = 900                   # advection sub-step [s]
met_interval     = 10800                 # 3-hour met updates
mass_flux_dt     = 450
Hp               = 3

# --- Initial conditions ---
[initial_conditions]
co2.file     = "~/data/AtmosTransport/catrine/InitialConditions/startCO2_202112010000.nc"
co2.variable = "CO2"
sf6.file     = "~/data/AtmosTransport/catrine/InitialConditions/startSF6_202112010000.nc"
sf6.variable = "SF6"

# --- Tracers ---

[tracers.co2]
emission   = "lmdz_co2"
dir        = "~/data/AtmosTransport/catrine/Emissions/LMDZ_fluxes"
species    = "co2"
flux_var   = "flux_apos"
start_date = "2021-12-01"
end_date   = "2023-12-31"

[tracers.fossil_co2]
emission = "gridfed"
dir      = "~/data/AtmosTransport/catrine/Emissions/gridfed"
species  = "fossil_co2"
year     = 2022

[tracers.sf6]
emission         = "edgar_sf6"
file             = "~/data/AtmosTransport/catrine/Emissions/edgar_v8/v8.0_FT2022_GHG_SF6_2022_TOTALS_emi.nc"
noaa_growth_file = "~/data/AtmosTransport/catrine/Emissions/sf6_gr_gl.txt"
year             = 2022
scale_year       = 2022

[tracers.rn222]
emission   = "zhang_rn222"
dir        = "~/data/AtmosTransport/catrine/Emissions/ZHANG_Rn222/"
chemistry  = "decay"
half_life  = 330350.4

# --- Chemistry ---
[chemistry]
type      = "composite"

# --- Advection ---
[advection]
scheme    = "ppm"
ppm_order = 7

# --- Convection ---
[convection]
type = "tiedtke"

# --- Diffusion ---
[diffusion]
type   = "pbl"
beta_h = 15.0
Kz_bg  = 0.1
Kz_min = 0.01
Kz_max = 500.0

# --- Output (3-hourly, regridded to lat-lon) ---
[output]
filename    = "~/data/output/catrine_geosfp_cs.nc"
interval    = 10800                      # 3 hours
output_grid = "latlon"
Nlon        = 720
Nlat        = 361

[output.fields]
co2                = "regrid"
fossil_co2         = "regrid"
sf6                = "regrid"
rn222              = "regrid"
surface_pressure   = "surface_pressure"
pbl_height         = "pbl_height"
tropopause_height  = "tropopause_height"

[buffering]
strategy = "double"
