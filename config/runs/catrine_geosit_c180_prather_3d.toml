# ===========================================================================
# CATRINE D7.1 — GEOS-IT C180 (Prather second-order moments advection)
#
# 4 tracers (CO2, fossil CO2, SF6, Rn222), Dec 1-3 2021.
# Prather advection with prognostic slopes on cubed-sphere.
# Full physics: RAS convection + nonlocal PBL diffusion.
# Paths follow DATA_LAYOUT.md.
# ===========================================================================

[architecture]
use_gpu    = true
float_type = "Float32"

[grid]
type       = "cubed_sphere"
met_source = "geosfp"
Nc         = 180

[met_data]
driver           = "geosfp_cs"
product          = "geosit_c180"
netcdf_dir       = "~/data/AtmosTransport/met/geosit_c180/raw_catrine"
preprocessed_dir = "~/data/AtmosTransport/met/geosit_c180/preprocessed/massflux"
surface_data_bin_dir = "~/data/AtmosTransport/met/geosit_c180/preprocessed/physics"
coord_file       = "~/data/AtmosTransport/grids/cs_c180_gridspec.nc"
start_date       = "2021-12-01"
end_date         = "2021-12-03"
dt               = 450
met_interval     = 3600
mass_flux_dt     = 450
Hp               = 3

[initial_conditions]
co2.file     = "~/data/AtmosTransport/catrine/InitialConditions/startCO2_202112010000.nc"
co2.variable = "CO2"
sf6.file     = "~/data/AtmosTransport/catrine/InitialConditions/startSF6_202112010000.nc"
sf6.variable = "SF6"

[tracers.co2]
emission   = "lmdz_co2"
file       = "~/data/AtmosTransport/catrine/preprocessed_c180/lmdz_co2_cs_c180_float32.bin"
species    = "co2"
flux_var   = "flux_apos"
start_date = "2021-12-01"
end_date   = "2023-12-31"

[tracers.fossil_co2]
emission = "gridfed"
file     = "~/data/AtmosTransport/catrine/preprocessed_c180/gridfed_fossil_co2_cs_c180_float32.bin"
species  = "fossil_co2"
year     = 2021

[tracers.sf6]
emission         = "edgar_sf6"
file             = "~/data/AtmosTransport/catrine/preprocessed_c180/edgar_sf6_cs_c180_float32.bin"
noaa_growth_file = "~/data/AtmosTransport/catrine/Emissions/sf6_gr_gl.txt"
year             = 2022
scale_year       = 2022

[tracers.rn222]
emission  = "zhang_rn222"
file      = "~/data/AtmosTransport/catrine/preprocessed_c180/zhang_rn222_cs_c180_float32.bin"
chemistry = "decay"
half_life = 330350.4

[chemistry]
type = "composite"

[advection]
scheme     = "prather"
use_limiter = true
mass_fixer = true
dry_correction = true

[convection]
type = "ras"

[diffusion]
type   = "nonlocal_pbl"
beta_h = 15.0
Kz_bg  = 0.1
Kz_min = 0.01
Kz_max = 500.0
fak    = 8.5
sffrac = 0.1

[output]
filename      = "~/data/AtmosTransport/output/catrine_prather_3d/catrine_prather"
format        = "binary"
auto_convert  = true
split         = "daily"
interval      = 10800

[output.fields]
sf6_3d           = {type = "full_3d", species = "sf6"}
fossil_co2_3d    = {type = "full_3d", species = "fossil_co2"}
co2_3d           = {type = "full_3d", species = "co2"}
rn222_3d         = {type = "full_3d", species = "rn222"}
sf6_column_mass  = {type = "column_mass", species = "sf6"}
fco2_column_mass = {type = "column_mass", species = "fossil_co2"}
co2_column_mass  = {type = "column_mass", species = "co2"}
rn222_column_mass = {type = "column_mass", species = "rn222"}
surface_pressure = "surface_pressure"
pbl_height       = "pbl_height"

[buffering]
strategy = "single"
