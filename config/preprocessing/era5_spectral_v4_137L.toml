# ERA5 spectral -> v4 binary: full 137 native levels + Poisson balance
# No level merging — every native ECMWF level kept. Most accurate setup.

[input]
spectral_dir = "~/data/AtmosTransport/met/era5/spectral_hourly"
thermo_dir = "~/data/AtmosTransport/met/era5/physics"
coefficients = "config/era5_L137_coefficients.toml"

[output]
directory = "/temp1/atmos_transport/era5_v4_137L"
mass_basis = "dry"

[grid]
nlon = 720
nlat = 361
level_top = 1
level_bot = 137
echlevs = "ml137_full"
merge_min_thickness_Pa = 1.0  # effectively no merging

[numerics]
float_type = "Float32"
dt = 900.0
met_interval = 3600.0
