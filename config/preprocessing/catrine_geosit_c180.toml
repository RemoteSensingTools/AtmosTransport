# ===========================================================================
# CATRINE D7.1 — GEOS-IT C180 Preprocessing
#
# Converts GEOS-IT C180 NetCDF mass fluxes to per-day flat binary files
# for fast mmap-based GPU ingestion.
#
# Input:  ~/data/geosit_c180_catrine/YYYYMMDD/GEOSIT.*.CTM_A1.C180.nc
# Output: /temp2/catrine-runs/met/geosit_c180/
#
# CRITICAL: mass_flux_dt = 450 s (dynamics timestep, NOT 3600 s met interval)
#
# Usage (parallel, 8 workers):
#   julia --project=. -p 8 scripts/preprocess_geosfp_cs.jl \
#       config/preprocessing/catrine_geosit_c180.toml
# ===========================================================================

[product]
name         = "geosit_c180"
mass_flux_dt = 450.0      # dynamics timestep [s]

[input]
data_dir   = "~/data/geosit_c180_catrine"
start_date = "2021-12-01"
end_date   = "2022-01-31"

[output]
directory = "/temp2/catrine-runs/met/geosit_c180"

[grid]
halo_width = 3

[numerics]
float_type = "Float32"

[diagnostics]
verbose = true
