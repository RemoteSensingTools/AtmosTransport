# ERA5 HOURLY merged (68L), Dec 2021, 4-tracer, advection + PBL diffusion
# Using v3 daily binary files (from preprocess_era5_daily.jl)
# Hourly met windows → 4 sub-steps of 900s each (matching spectral dt)
#
# Phase 1: Advection + PBL diffusion only (no convection)
#   Isolate impact of cos(φ) fix, flux/n_sub, reduced grid fixes
# Phase 2: Enable TM5 convection (uncomment [convection] below)

[architecture]
use_gpu    = true
float_type = "Float32"

[grid]
type       = "latlon"
met_source = "era5"

[met_data]
driver    = "preprocessed_latlon"
directory = "/temp1/atmos_transport/era5_daily_v3"
dt        = 900     # matches spectral preprocessor dt (n_sub=4)

[initial_conditions]
co2.file     = "~/data/AtmosTransport/catrine/InitialConditions/startCO2_202112010000.nc"
co2.variable = "CO2"
sf6.file     = "~/data/AtmosTransport/catrine/InitialConditions/startSF6_202112010000.nc"
sf6.variable = "SF6"

[tracers.co2]
emission   = "lmdz_co2"
dir        = "~/data/AtmosTransport/catrine/Emissions/LMDZ_fluxes"
species    = "co2"
flux_var   = "flux_apos"
start_date = "2021-12-01"
end_date   = "2021-12-31"

[tracers.fossil_co2]
emission = "gridfed"
dir      = "~/data/AtmosTransport/catrine/Emissions/gridfed"
species  = "fossil_co2"
year     = 2021

[tracers.sf6]
emission         = "edgar_sf6"
file             = "~/data/AtmosTransport/catrine/Emissions/edgar_v8/v8.0_FT2022_GHG_SF6_2022_TOTALS_emi.nc"
noaa_growth_file = "~/data/AtmosTransport/catrine/Emissions/sf6_gr_gl.txt"
year             = 2022
scale_year       = 2022

[tracers.rn222]
emission   = "zhang_rn222"
dir        = "~/data/AtmosTransport/catrine/Emissions/ZHANG_Rn222/"
chemistry  = "decay"
half_life  = 330350.4

[chemistry]
type = "composite"

[advection]
scheme = "slopes"

# Phase 2: TM5 matrix convection (disabled for debugging — excess spatial variability)
# [convection]
# type = "tm5"

[diffusion]
type   = "pbl"
beta_h = 15.0
Kz_bg  = 0.1
Kz_min = 0.01
Kz_max = 500.0

[output]
filename = "~/data/AtmosTransport/catrine/output/era5_hourly_v3_dec2021/catrine_era5_hourly.nc"
interval = 10800    # 3-hourly output (matches GeosChem snapshot frequency)

[output.fields]
co2_3d           = {type = "full_3d", species = "co2"}
fossil_co2_3d    = {type = "full_3d", species = "fossil_co2"}
sf6_3d           = {type = "full_3d", species = "sf6"}
rn222_3d         = {type = "full_3d", species = "rn222"}
surface_pressure = "surface_pressure"

[buffering]
strategy = "double"
