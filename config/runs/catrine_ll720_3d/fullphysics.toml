# Catrine LL 720×361 3-day reference — FULL PHYSICS
#
# Advection + constant-Kz diffusion + TM5 convection + GridFED fossil-CO2
# surface flux. Requires the LL binary to carry TM5 sections (see
# advdiffconv.toml for the inspector check).
#
# Runner:   julia -t8 --project=. scripts/run_transport.jl \
#               config/runs/catrine_ll720_3d/fullphysics.toml

[input]
folder       = "~/data/AtmosTransport/met/era5/ll720x361_v4/transport_binary_v2_tropo34_dec2021_f64/"
start_date   = "2021-12-01"
end_date     = "2021-12-03"
file_pattern = "era5_transport_{YYYYMMDD}_merged1000Pa_float64.bin"

[architecture]
use_gpu = true

[numerics]
float_type = "Float32"

[run]
scheme = "slopes"

[tracers.co2_natural]
[tracers.co2_natural.init]
kind = "catrine_co2"

[tracers.co2_fossil]
[tracers.co2_fossil.init]
kind = "uniform"
background = 0.0

[tracers.co2_fossil.surface_flux]
kind       = "gridfed_fossil_co2"
file       = "~/data/AtmosTransport/catrine/Emissions/gridfed/GCP-GridFEDv2024.0_2021.short.nc"
time_index = 12

[diffusion]
kind  = "constant"
value = 1.0

[convection]
kind = "tm5"

[output]
snapshot_hours = [0, 6, 12, 18, 24, 30, 36, 42, 48, 54, 60, 66, 72]
snapshot_file = "~/data/AtmosTransport/output/catrine_ll720_3d/fullphysics.nc"
