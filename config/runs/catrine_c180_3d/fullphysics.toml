# Catrine C180 3-day test — FULL PHYSICS (advection + diffusion + convection)
#
# STATUS — DOES NOT RUN TODAY (TM5 gap; see advdiffconv.toml).
#
# NOTE — CS runner does NOT apply surface fluxes today. See
# `config/runs/catrine_c48_3d/fullphysics.toml` for the full explanation.
# Until `_run_driven_simulation_cs` threads `surface_sources` through
# to `DrivenSimulation`, this config leaves fossil emissions off on CS
# and relies on `catrine_ll720_3d/fullphysics.toml` for the LL
# emissions reference.
#
# Runner:   julia -t8 --project=. scripts/run_transport.jl \
#               config/runs/catrine_c180_3d/fullphysics.toml

[input]
folder     = "~/data/AtmosTransport/met/era5/cs_c180/transport_binary_v2_tropo34_dec2021_f64/"
start_date = "2021-12-01"
end_date   = "2021-12-03"

[architecture]
use_gpu = true

[numerics]
float_type = "Float32"

[run]
scheme = "slopes"

[tracers.co2_natural]
[tracers.co2_natural.init]
kind = "catrine_co2"

[tracers.co2_fossil]
[tracers.co2_fossil.init]
kind = "uniform"
background = 0.0

# [tracers.co2_fossil.surface_flux] omitted on CS — see STATUS note above.

[diffusion]
kind  = "constant"
value = 1.0

[convection]
kind = "tm5"

[output]
snapshot_hours = [0, 6, 12, 18, 24, 30, 36, 42, 48, 54, 60, 66, 72]
snapshot_file = "~/data/AtmosTransport/output/catrine_c180_3d/fullphysics.nc"
